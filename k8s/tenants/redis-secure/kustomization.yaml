apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: redis-demo

resources:
  - namespace.yaml
  - network-policy.yaml
  - resource-quota.yaml
  - limit-range.yaml
  - ../components/secure-pv-bootstrap
  - serviceaccount.yaml
  - statefulset.yaml
  - service.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: redis
