# Tenant isolation: ingress from same namespace only; egress to DNS, same namespace, and KBS.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tenant-isolation
  namespace: postgresql-demo
spec:
  description: "Strict network isolation for multi-tenant security"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: postgresql-demo
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: postgresql-demo
    - toServices:
        - k8sService:
            namespace: trustee-operator-system
            serviceName: kbs-service
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - path: "^/kbs/v0/auth$"
              - path: "^/kbs/v0/attest$"
              - path: "^/kbs/v0/resource/default/postgresql-demo-storage/workload-secret-seed$"
