# Cilium Helm Chart Values
# Version: 1.18.6
# Chart: https://github.com/cilium/cilium/tree/main/install/kubernetes/cilium
# Docs: https://docs.cilium.io/en/stable/helm-reference.html
#
# Security Features:
# - WireGuard transparent encryption (UDP port 51871)
# - Mutual Authentication with SPIFFE/SPIRE (Beta)
# - Network policy enforcement
#
# Prometheus Metrics:
# - Cilium Agent metrics on port 9962
# - Cilium Operator metrics on port 9963
# - Hubble Relay metrics on port 9966
# - ServiceMonitor support for Prometheus Operator (disabled by default)
# - To enable ServiceMonitor, set *.serviceMonitor.enabled: true

# Cluster configuration
cluster:
  name: "{{ cluster_name | default('k3s-cluster') }}"
  id: 1

# IPAM configuration
ipam:
  mode: kubernetes

# Kubernetes API server access
k8sServiceHost: "{{ hostvars[groups['masters'][0]]['private_ip'] | default(hostvars[groups['masters'][0]]['ansible_host']) }}"
k8sServicePort: 6443

# Tunnel/Overlay mode (tunnel key was removed in Cilium v1.15+)
tunnelProtocol: vxlan
routingMode: tunnel

# kube-proxy replacement
kubeProxyReplacement: true
# Kata/CoCo: socket-level loadbalancer must be host-namespace-only to avoid connectivity
# issues in the guest VM (see https://docs.cilium.io/en/stable/network/kubernetes/kata/)
socketLB:
  hostNamespaceOnly: true
# Stonegarden: higher burst avoids rate limiting under L2/load balancer usage
k8sClientRateLimit:
  qps: 50
  burst: 200

# Hubble for network observability
hubble:
  enabled: true
  
  # Hubble Relay (control-plane only when workers have no outbound)
  relay:
    enabled: true
    replicas: 1
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
    prometheus:
      enabled: true
      port: 9966
      serviceMonitor:
        enabled: {{ cilium_enable_service_monitor | default(false) }}
  
  # Hubble UI (control-plane only when workers have no outbound)
  ui:
    enabled: true
    replicas: 1
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
  
  # Hubble Metrics (Prometheus/Grafana integration)
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - httpV2
      - icmp
      - flows-to-world
    serviceMonitor:
      enabled: {{ cilium_enable_service_monitor | default(false) }}
    dashboards:
      enabled: true   # Grafana: import Hubble dashboards by label
    openMetrics:
      enabled: true
    # Scrape Hubble metrics via Prometheus (flows and policy decisions)
    enableOpenMetrics: true

# Network Policy
policyEnforcementMode: default

# WireGuard Transparent Encryption
# Docs: https://docs.cilium.io/en/stable/security/network/encryption-wireguard.html
# Requirements: Linux kernel 5.6+ with CONFIG_WIREGUARD=m
encryption:
  enabled: true
  type: wireguard
  wireguard:
    persistentKeepalive: 0s  # Set to e.g. 25s if nodes are behind NAT
  nodeEncryption: false  # Set to true to encrypt node-to-node traffic

# Mutual Authentication (Beta)
# Docs: https://docs.cilium.io/en/stable/network/servicemesh/mutual-authentication/
# Combined with encryption.enabled=true provides mTLS-like security
# Uses Cilium's identity-based authentication without requiring SPIRE
authentication:
  enabled: true

# BPF configuration
# Use iptables masquerade (not BPF): bpf.masquerade=true breaks pod->kubernetes API connectivity
# (CoreDNS "Failed to watch"), see https://github.com/cilium/cilium/issues/37537. kube-proxy
# replacement is unchanged and remains full eBPF; only egress SNAT uses iptables.
bpf:
  masquerade: false
  tproxy: true
  # Monitor aggregation: medium (default); use "maximum" for deeper visibility when troubleshooting
  monitorAggregation: "{{ cilium_monitor_aggregation | default('medium') }}"
  # BPF events (chart default: drop, policyVerdict, trace already enabled)

# Observability: BPF clock probe for latency tracking
bpfClockProbe: true

# Security: block all endpoint traffic on policy map overflow (stricter observability)
endpointLockdownOnMapOverflow: true

# Masquerade to route source: only relevant when using BPF masquerade (we use iptables masquerade).
enableMasqueradeRouteSource: false

# Envoy L7 proxy (external DaemonSet): access log buffer for high-traffic pods
# Tune envoyAccessLogBufferSize (bytes) if you see "Discarded truncated access log message"
envoy:
  enabled: true
  log:
    accessLogBufferSize: {{ cilium_envoy_access_log_buffer_size | default(4096) }}

# DNS/L7: ToFQDN compression and limits (existing defaults are suitable for scale)
dnsProxy:
  enableDnsCompression: true

# Enable IPv4
ipv4:
  enabled: true

# IPv6 disabled (skip enablement per requirements)
ipv6:
  enabled: false

# Operator configuration
# Run operator on control-plane so CRDs are registered before agents (which wait for them).
operator:
  replicas: 1
  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  prometheus:
    enabled: true
    port: 9963
    serviceMonitor:
      enabled: {{ cilium_enable_service_monitor | default(false) }}

# Prometheus metrics (chart expects metrics to be null or array, not object)
prometheus:
  enabled: true
  port: 9962
  metricsService: true
  serviceMonitor:
    enabled: {{ cilium_enable_service_monitor | default(false) }}
  metrics: []         # Empty array = chart defaults; or space-sep +name/-name

# Security
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Tolerations for master nodes
tolerations:
  - operator: Exists
