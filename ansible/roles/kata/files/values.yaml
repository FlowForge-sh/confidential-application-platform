# Kata Containers Helm Chart Values
# Version: 3.25.0
# Chart: https://github.com/kata-containers/kata-containers/tree/main/tools/packaging/kata-deploy/helm-chart
# Docs: https://github.com/kata-containers/kata-containers/blob/main/tools/packaging/kata-deploy/helm-chart/README.md

# K3s-specific configuration
k8sDistribution: k3s

# Image pull policy
imagePullPolicy: IfNotPresent

# Debug mode (set to true for troubleshooting)
debug: false

# Snapshotter configuration
# Leave empty for standard Kata, CoCo will override this
snapshotter:
  setup: []

# Shim configuration
# Only enable standard QEMU shim for non-CoCo deployments
# CoCo chart will manage TEE shims (qemu-snp, qemu-tdx)
shims:
  # Disable all shims, then enable only what we need
  disableAll: true
  
  # Standard QEMU shim (for non-TEE workloads)
  qemu:
    enabled: true
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""
      forceGuestPull: false
    agent:
      httpsProxy: ""
      noProxy: ""
  
  # Optionally enable qemu-runtime-rs (Rust-based runtime)
  qemu-runtime-rs:
    enabled: false
    supportedArches:
      - amd64
    allowedHypervisorAnnotations: []
    containerd:
      snapshotter: ""
      forceGuestPull: false
    agent:
      httpsProxy: ""
      noProxy: ""
  
  # Disable other shims (not needed for standard K3s deployment)
  clh:
    enabled: false
  cloud-hypervisor:
    enabled: false
  dragonball:
    enabled: false
  fc:
    enabled: false
  
  # TEE shims should be disabled here - CoCo chart handles these
  qemu-snp:
    enabled: false
  qemu-tdx:
    enabled: false
  qemu-se:
    enabled: false
  qemu-se-runtime-rs:
    enabled: false
  qemu-cca:
    enabled: false
  qemu-coco-dev:
    enabled: false
  qemu-coco-dev-runtime-rs:
    enabled: false
  
  # Disable NVIDIA GPU shims
  qemu-nvidia-gpu:
    enabled: false
  qemu-nvidia-gpu-snp:
    enabled: false
  qemu-nvidia-gpu-tdx:
    enabled: false

# Default shim per architecture
defaultShim:
  amd64: qemu

# RuntimeClass configuration
runtimeClasses:
  enabled: true
  createDefault: false  # Don't create default "kata" RuntimeClass
  defaultName: "kata"

# Node selector (optional - target specific nodes)
# nodeSelector:
#   kata.enabled: "true"

# Tolerations (optional - schedule on tainted nodes)
# tolerations:
#   - operator: Exists
