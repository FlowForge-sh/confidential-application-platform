---
# Variables for master (control plane) nodes

# First master in inventory is primary
is_primary: "{{ inventory_hostname == groups['masters'][0] }}"

# Install k8s-tools (kustomize, sops, age, k9s) on masters for tenant overlay apply (decrypt then kustomize build)
install_k8s_tools: true
master_count: "{{ groups['masters'] | length }}"

# K3s server configuration (used by k3s-master template)
k3s_server_config:
  write-kubeconfig-mode: "0644"
  tls-san:
    - "{{ ansible_host }}"
    - "{{ private_ip | default(ansible_host) }}"
  cluster-cidr: "{{ cluster_cidr }}"
  service-cidr: "{{ service_cidr }}"
  cluster-dns: "{{ cluster_dns }}"
  disable:
    - traefik
    - local-storage
  flannel-backend: none
  disable-network-policy: true
  disable-cloud-controller: true
  kube-apiserver-arg:
    - "anonymous-auth=false"
    - "profiling=false"
    - "audit-log-path=/var/log/kubernetes/audit.log"
    - "audit-log-maxage=30"
    - "audit-log-maxbackup=10"
    - "audit-log-maxsize=100"
  kube-controller-manager-arg:
    - "profiling=false"
    - "terminated-pod-gc-threshold=100"
  kube-scheduler-arg:
    - "profiling=false"
  kubelet-arg:
    - "protect-kernel-defaults=true"
    - "streaming-connection-idle-timeout=5m"

k3s_etcd_config:
  etcd-expose-metrics: true
  etcd-snapshot-schedule-cron: "0 */6 * * *"
  etcd-snapshot-retention: 7

install_cilium: true
cilium_helm_values:
  operator:
    replicas: 1
  ipam:
    mode: kubernetes
  kubeProxyReplacement: strict
  k8sServiceHost: "{{ private_ip | default(ansible_host) }}"
  k8sServicePort: 6443
  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true
  networkPolicy:
    enabled: true
