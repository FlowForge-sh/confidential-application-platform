# Schema for secrets.sops.yaml (SOPS-encrypted).
# Copy into secrets.sops.yaml, set values, then encrypt with SOPS.
# Do not commit decrypted secrets; this file is a template only.
---
# Caddy DNS-01: per-zone Cloudflare API tokens (one token per DNS zone / tenant).
# Keys = DNS zone (e.g. flowforge.sh, skb.sh); values = API token for that zone.
# Each token needs Zone:Zone:Read + Zone:DNS:Edit for its zone.
# In group_vars (e.g. all.yml), set caddy_routes with host, backend, and zone per route;
# zone must match a key below.
cloudflare_tokens:
  example1.com: "YOUR_TOKEN_FOR_DOMAIN_EXAMPLE_1_COM_ZONE"
  example2.com: "YOUR_TOKEN_FOR_DOMAIN_EXAMPLE_2_COM_ZONE"
  # More zones...
